<html>
    <head>
        <style>
            button {
                background-color: black;
                color: white;
                width: 80px;
                height: 80px;
                margin-bottom: 5px;
                border-radius: 50%;
                font-size: 20px;
            }
            /* color, background-color, width, height, margin-bottom, border-radius, font-size> are all properties of an element in css. */
            section {
                background-color: gray;
                width: 400px;
                border-radius: 20px;
                padding: 20px;
            }
            .Muna{
                background-color: orange;
                text-color: white;
            }
            input{
                width: 360px;
                height: 50px;
                margin-bottom: 10px;
                font-size: 30px;
                font-weight: bold;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <section>
            <div>
                <h1>Calculator</h1>
            </div>
            <div>
                <input type="number" placeholder="type a number">
            </div>

            <div>
                <button>AC</button>
                <button>+/-</button>
                <button>%</button>
                <button class="Muna">/</button>
            </div>
             <div>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="Muna">X</button>
            </div>
            <div>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="Muna">-</button>
            </div>
            <div>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="Muna">+</button>
            </div>
                <div>
                    <button>lol</button>
                    <button>0</button>
                    <button>.</button>
                    <button class="Muna">=</button>
                </div>
        </section>
    </body>
</html>
